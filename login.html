<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Testing</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        /* 登录页专用样式 */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            border: 1px solid #e9edf2;
        }
        .login-title {
            font-size: 1.8rem;
            font-weight: 500;
            color: #1e3a5f;
            margin-bottom: 0.5rem;
        }
        .login-sub {
            color: #6b7f94;
            margin-bottom: 2rem;
        }
        .login-form label {
            display: block;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 0.3rem;
        }
        .login-form input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #d0ddee;
            border-radius: 16px;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            background: #fafcff;
            transition: border 0.15s;
        }
        .login-form input:focus {
            outline: none;
            border-color: #1e3a5f;
            background: white;
        }
        .login-btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 0.9rem 1.5rem;
            width: 100%;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #112b44;
        }
        .error-message {
            color: #c0392b;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            min-height: 24px;
        }
        .demo-hint {
            margin-top: 1.8rem;
            background: #f0f4fa;
            padding: 1rem;
            border-radius: 16px;
            font-size: 0.85rem;
            color: #3a5c7c;
        }
        .demo-hint code {
            background: #d9e2ef;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-title">🔐 登录</div>
        <div class="login-sub">请输入您的账户信息</div>

        <form class="login-form" id="loginForm">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="admin / chris / test" autocomplete="off" required>

            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="······" required>

            <button type="submit" class="login-btn">登 录</button>
        </form>

        <div id="loginError" class="error-message"></div>

        <div class="demo-hint">
            <strong>演示账号</strong><br>
            <code>admin / 123456</code> &nbsp; | &nbsp;
            <code>chris / qwer1234</code> &nbsp; | &nbsp;
            <code>test / test</code>
        </div>
    </div>

    <script src="account.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('loginError');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorDiv.textContent = '用户名和密码不能为空';
                return;
            }

            if (validateCredentials(username, password)) {
                setLoginStatus(username);
                // 登录成功，跳转回主页
                window.location.href = './index.html';
            } else {
                errorDiv.textContent = '用户名或密码错误';
            }
        });
    </script>
</body>
</html>
